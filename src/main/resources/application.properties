# Spring Data JPA & Supabase Postgres Configuration
# prepareThreshold=0 disables server-side named prepared statements — required when
# connecting through Supabase/PgBouncer (pooler port 6543) to avoid
# "prepared statement S_1 already exists" errors during Flyway/Hibernate startup.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&prepareThreshold=0
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Hibernate Properties — schema owned by Flyway; Hibernate validates only
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — baseline-on-migrate records V1 on databases created before migration tracking
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# Enforce explicit route mapping fallbacks matching contract improvements
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Dynamic Firebase Initialization Path
# Render will inject FIREBASE_CONFIG_PATH. Locally, it defaults to the resource folder.
# =====================================================================
# Firebase Admin SDK Configuration
# =====================================================================
# Render will inject raw JSON into the environment. Locally, it stays empty.
cablepulse.firebase.config-json=${CABLEPULSE_FIREBASE_JSON:}

# Path-based fallback layout (Used for local machine development)
cablepulse.firebase.config-path=${CABLEPULSE_FIREBASE_PATH:classpath:firebase-service-account.json}

# Keep the security gateway active
cablepulse.firebase.enabled=true

# JWT access (15 min) and refresh (30 days) tokens issued after Firebase token-swap.
cablepulse.jwt.secret=${CABLEPULSE_JWT_SECRET:cablepulse-local-dev-jwt-secret-key-32b-min}

# Production: set CABLEPULSE_STRICT_SECRETS=true and a strong CABLEPULSE_JWT_SECRET (32+ bytes).
cablepulse.security.strict-secrets=${CABLEPULSE_STRICT_SECRETS:false}

# Comma-separated emails allowed to bootstrap as OWNER when no owner exists (first sign-in only).
cablepulse.security.bootstrap-owner-emails=${CABLEPULSE_BOOTSTRAP_OWNER_EMAILS:}

# Auth endpoint rate limit (requests per minute per client IP).
cablepulse.security.auth-rate-limit-per-minute=${CABLEPULSE_AUTH_RATE_LIMIT:60}

# Mobile app version rules — read by GET /api/v1/auth/app-version-check
cablepulse.app.latest-stable-version=${CABLEPULSE_APP_LATEST_VERSION:1.0.10}
cablepulse.app.minimum-required-version=${CABLEPULSE_APP_MINIMUM_VERSION:1.0.1}
cablepulse.app.is-critical-patch=${CABLEPULSE_APP_CRITICAL_PATCH:false}

# Dev-only: accept raw Firebase ID tokens on API routes (prefer backend JWT in production).
cablepulse.security.allow-firebase-bearer=${CABLEPULSE_ALLOW_FIREBASE_BEARER:false}

# Dev-only: echo Firebase token when JWT signing fails. Never enable in production.
cablepulse.security.allow-jwt-fallback=${CABLEPULSE_ALLOW_JWT_FALLBACK:false}

# ---------------------------------------------------------------------------
# Local dev (no Supabase env vars):
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Production (Render) must set: DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
# ---------------------------------------------------------------------------