# Spring Data JPA & Supabase Postgres Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enforce explicit route mapping fallbacks matching contract improvements
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Dynamic Firebase Initialization Path
# Render will inject FIREBASE_CONFIG_PATH. Locally, it defaults to the resource folder.
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}