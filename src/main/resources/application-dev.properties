# Local development profile — no Supabase / Render env vars required.
#
# Run:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
#
# Uses an on-disk H2 database (PostgreSQL compatibility mode) under .local-data/

spring.datasource.url=jdbc:h2:file:./.local-data/cablepulse;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Hibernate creates/updates schema locally; Flyway targets production Postgres.
spring.flyway.enabled=false

server.port=8080

cablepulse.security.allow-jwt-fallback=true
cablepulse.security.allow-firebase-bearer=true
