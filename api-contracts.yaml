openapi: 3.0.3
info:
  title: Cable Pulse Core API
  description: Master API Contract Blueprint for Cable Pulse CRM Flutter Client and Spring Boot Backend.
  version: 1.1.0
servers:
  - url: https://api.cablepulse.com/api/v1
    description: Production Environment Gateway
paths:
  /auth/token-swap:
    post:
      summary: Authentication Identity Token Swap Gateway
      operationId: tokenSwap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firebaseIdToken
              properties:
                firebaseIdToken:
                  type: string
                  example: "eyJhbGciOiJSUzI1NiIsImtpZCI6..."
      responses:
        '200':
          description: Identity verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_AuthData'

  /dashboard/metrics:
    get:
      summary: Fetch Home Dashboard Scoped Metrics
      operationId: getDashboardMetrics
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Financial and customer metrics compiled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_DashboardData'

  /workspace/customers:
    get:
      summary: Get Territory Workspace Customer Feed
      operationId: getWorkspaceCustomers
      parameters:
        - name: locationId
          in: query
          required: true
          schema:
            type: string
          example: "vil_kolamuru_001"
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Collection feed entries retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_WorkspaceData'

  /workspace/providers:
    get:
      summary: Fetch Active Third-Party Connection Infrastructure Lines
      operationId: getConnectionProviders
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Connection providers compiled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_ProviderListData'
    post:
      summary: Onboard New Third-Party Connection Infrastructure Line
      operationId: createConnectionProvider
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "AP Fiber"
      responses:
        '201':
          description: Connection line registered successfully

  /plans:
    get:
      summary: Retrieve Global Pricing Packages Filtered by Active Provider
      operationId: getPlansByProvider
      parameters:
        - name: providerName
          in: query
          required: true
          schema:
            type: string
          example: "AP Fiber"
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Subscribed plans array packet processed cleanly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_PlansData'

  /customers/{id}/ledger:
    get:
      summary: Retrieve Individual Customer Historic Account Ledger
      operationId: getCustomerLedger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "cust-gen-001"
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Account billing matrix retrieved up to current month
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_LedgerData'

  /customers/search:
    get:
      summary: Search-Driven Auto-Suggest Customer Utility
      operationId: searchCustomers
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          example: "Satish"
        - name: block
          in: query
          required: false
          schema:
            type: string
          example: "Block A"
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Real-time dropdown suggestions array compiled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_SearchData'

  /transactions/expense:
    post:
      summary: Log New Outbound Local Field Operation Expense
      operationId: logOperationalExpense
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
                - description
                - expenseCategory
              properties:
                amount:
                  type: number
                  example: 500.00
                description:
                  type: string
                  example: "Coaxial Wire 100m Coil Purchase"
                expenseCategory:
                  type: string
                  enum: [WIRE, FUEL, REPAIR, WAGES, MISC]
                  example: "WIRE"
      responses:
        '201':
          description: Operational cost saved to ledger context

  /transactions/isp-settlement:
    post:
      summary: Log Upstream Wholesale Third-Party Provider Payout Settlement
      operationId: logIspSettlement
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - connectionTypeName
                - amountPaid
                - paymentStatus
              properties:
                connectionTypeName:
                  type: string
                  example: "JIO"
                amountPaid:
                  type: number
                  example: 4500.00
                paymentStatus:
                  type: string
                  enum: [FULL_PAYMENT, PARTIAL_PAYMENT]
                  example: "PARTIAL_PAYMENT"
                settlementNotes:
                  type: string
                  example: "Cleared part of May line rental cycle fees"
      responses:
        '201':
          description: Wholesale vendor distribution data synchronized

  /transactions/daily-summary:
    get:
      summary: Get Complete Dual-Ledger Cash Drawer Core Sum Balance
      operationId: getDailyCashDrawerSummary
      parameters:
        - name: targetDate
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-06-07"
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Unified financial parameters loaded cleanly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_DailyCashSummaryData'

  /saas/pricing:
    get:
      summary: Fetch Available App SaaS Subscription Tiers Managed by Regional Geolocation
      operationId: getSaasPricingMatrix
      parameters:
        - $ref: '#/components/parameters/XUserCountryCode'
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      responses:
        '200':
          description: Multi-currency enterprise packaging schemas returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_SaasPricingData'

  /sync/synchronize:
    post:
      summary: Idempotent Background Sync Batch Processing Upload Engine
      operationId: synchronizeOfflineQueue
      parameters:
        - $ref: '#/components/parameters/XE2EID'
        - $ref: '#/components/parameters/XSessionID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncRequestPayload'
      responses:
        '200':
          description: Offline mutation array synchronized successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse_SyncResolution'

components:
  parameters:
    XE2EID:
      name: X-E2E-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XSessionID:
      name: X-Session-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XUserCountryCode:
      name: X-User-Country-Code
      in: header
      required: false
      schema:
        type: string
        default: "IN"
      example: "IN"

  schemas:
    BaseResponse:
      type: object
      required:
        - timestamp
        - status
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2026-06-07T10:30:00Z"
        status:
          type: string
          example: "SUCCESS"
        error:
          type: string
          nullable: true
          example: null

    StandardResponse_AuthData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                accessToken:
                  type: string
                accessTokenExpiresInSeconds:
                  type: integer
                  example: 900
                refreshToken:
                  type: string
                userProfile:
                  type: object
                  properties:
                    userId:
                      type: string
                    fullName:
                      type: string
                    role:
                      type: string
                      enum: [ROLE_OWNER, ROLE_COLLECTION_BOY]

    StandardResponse_DashboardData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                customerSummary:
                  type: object
                  properties:
                    totalCustomers:
                      type: integer
                    pendingCustomers:
                      type: integer
                financialSummary:
                  type: object
                  nullable: true
                  properties:
                    amountPaid:
                      type: number
                    amountPending:
                      type: number
                    currency:
                      type: string
                    billingCyclePeriod:
                      type: string

    StandardResponse_WorkspaceData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                locationId:
                  type: string
                locationName:
                  type: string
                customers:
                  type: array
                  items:
                    type: object
                    properties:
                      customerId:
                        type: string
                      serialNumber:
                        type: integer
                      fullName:
                        type: string
                      doorNumber:
                        type: string
                      streetName:
                        type: string
                      connectionType:
                        type: string
                        example: "AP Fiber"
                      boxNumber:
                        type: string
                        nullable: true
                        example: "STB987654"
                      cardNumber:
                        type: string
                        nullable: true
                        example: "VC11223344"
                      activePlanName:
                        type: string
                      monthlyRate:
                        type: number
                      paymentStatus:
                        type: string
                        enum: [PAID, UNPAID, PARTIAL, COLLECTION_TODAY]
                      balanceDue:
                        type: number

    StandardResponse_ProviderListData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                    example: "AP Fiber"

    StandardResponse_PlansData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  planId:
                    type: string
                  name:
                    type: string
                    example: "Pro HD Pack"
                  price:
                    type: number
                    example: 199.00
                  details:
                    type: string
                    example: "Full HD & Sports Channels Pack"

    StandardResponse_LedgerData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                customerId:
                  type: string
                fullName:
                  type: string
                totalBalanceDue:
                  type: number
                ledger:
                  type: array
                  items:
                    type: object
                    properties:
                      month:
                        type: string
                        example: "MAY"
                      year:
                        type: integer
                        example: 2026
                      status:
                        type: string
                      paidAmount:
                        type: number
                      dueAmount:
                        type: number

    StandardResponse_DailyCashSummaryData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                totalCollectedToday:
                  type: number
                  example: 12450.00
                totalExpensedToday:
                  type: number
                  example: 700.00
                totalIspSettlementsToday:
                  type: number
                  example: 4500.00
                netCashInHand:
                  type: number
                  example: 7250.00

    StandardResponse_SaasPricingData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                promotionalTrialActive:
                  type: boolean
                  example: true
                trialEndsAt:
                  type: string
                  format: date-time
                  example: "2026-09-05T23:59:59Z"
                currencyCode:
                  type: string
                  example: "INR"
                tiers:
                  type: array
                  items:
                    type: object
                    properties:
                      tierName:
                        type: string
                        example: "BASIC"
                      billingCycle:
                        type: string
                        example: "MONTHLY"
                      retailPrice:
                        type: number
                        example: 149.00
                      discountedPrice:
                        type: number
                        example: 99.00

    StandardResponse_SearchData:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  customerId:
                    type: string
                  label:
                    type: string
                    example: "14. K. Satish Kumar (Block A)"

    SyncRequestPayload:
      type: object
      required:
        - syncBatchId
        - events
      properties:
        syncBatchId:
          type: string
          format: uuid
        events:
          type: array
          items:
            type: object
            required:
              - eventId
              - actionType
              - idempotencyToken
              - payload
            properties:
              eventId:
                type: string
              actionType:
                type: string
                example: "RECORD_PAYMENT"
              idempotencyToken:
                type: string
                format: uuid
              payload:
                type: object

    StandardResponse_SyncResolution:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                syncResolution:
                  type: object
                  properties:
                    processedEventIds:
                      type: array
                      items:
                        type: string
                    rejectedEventIds:
                      type: array
                      items:
                        type: string